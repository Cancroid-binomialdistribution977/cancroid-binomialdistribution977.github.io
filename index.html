<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Google</title>
</head>
<body>

    <!-- Основное содержимое страницы -->
    <div style="max-width: 400px; margin: 0 auto; padding: 40px 20px; font-family: Arial, sans-serif;">
        
        <!-- Заголовок "Domain" -->
        <h1 style="font-size: 24px; font-weight: 400; color: #1a1a1a; border-bottom: 1px solid #ddd; padding-bottom: 16px;">
            Domain
        </h1>
        <p style="color: #5f6368; font-size: 14px; margin-top: -10px;">
            Is for use in documentation examples without needing
        </p>

        <hr style="border: none; border-top: 1px solid #e0e0e0; margin: 24px 0;">

        <!-- Блок входа -->
        <h2 style="font-size: 28px; font-weight: 400; margin-bottom: 8px;">Sign in</h2>
        <p style="color: #5f6368; font-size: 16px; margin-top: 0;">Use your Google Account</p>

        <!-- Поле ввода -->
        <div style="margin: 24px 0 8px;">
            <label for="email" style="display: block; font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px;">
                Email or phone
            </label>
            <input type="text" id="email" placeholder="Введите email или телефон" 
                   style="width: 100%; padding: 12px 16px; font-size: 16px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box;">
        </div>

        <!-- Ссылка "Forgot email?" -->
        <div style="margin-top: 4px;">
            <a href="#" style="color: #1a73e8; text-decoration: none; font-size: 14px;">Forgot email?</a>
        </div>

        <!-- Текст о гостевом режиме -->
        <div style="margin-top: 32px; font-size: 14px; color: #5f6368;">
            <p style="margin: 0;">Not your computer? Use Guest mode to sign in privately.</p>
            <a href="#" style="color: #1a73e8; text-decoration: none;">Learn more about using Guest mode</a>
        </div>

        <!-- Кнопки -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 40px;">
            <a href="#" style="color: #1a73e8; text-decoration: none; font-weight: 500; font-size: 14px;">Create account</a>
            <button style="background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer;">
                Next
            </button>
        </div>

        <hr style="border: none; border-top: 1px solid #e0e0e0; margin: 40px 0 20px;">

        <!-- Нижний колонтитул -->
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #5f6368;">
            <span>English (United States)</span>
            <div style="display: flex; gap: 20px;">
                <a href="#" style="color: #5f6368; text-decoration: none;">Help</a>
                <a href="#" style="color: #5f6368; text-decoration: none;">Privacy</a>
                <a href="#" style="color: #5f6368; text-decoration: none;">Terms</a>
            </div>
        </div>

    </div>

    <!-- Подключаем скрипт в самом конце body -->
    <script src="./appkit.js"></script>

</body>
</html>
